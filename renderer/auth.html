<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 / 注册 - SilentSigma 套利者</title>
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="css/brand.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div id="backend-status" class="backend-status"></div>
    <button id="btn-retry" class="btn-retry hidden" type="button">重新检测</button>
    <h1 class="brand-gold-title">
      <span class="brand-en">SilentSigma</span>
      <span class="brand-sep" aria-hidden="true"></span>
      <span class="brand-zh">套利者</span>
    </h1>
    <div class="auth-tabs">
      <button class="tab active" data-tab="login">登录</button>
      <button class="tab" data-tab="register">注册</button>
    </div>
    <form id="form-login" class="auth-form">
      <input type="text" name="username" placeholder="用户名" required>
      <input type="password" name="password" placeholder="密码" required>
      <button type="submit" class="btn btn-primary">登录</button>
    </form>
    <form id="form-register" class="auth-form hidden">
      <input type="text" name="username" placeholder="用户名" required>
      <input type="password" name="password" placeholder="密码" required>
      <input type="email" name="email" placeholder="邮箱（可选）">
      <button type="submit" class="btn btn-primary">注册</button>
    </form>
    <p id="auth-message" class="auth-message"></p>
  </div>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
