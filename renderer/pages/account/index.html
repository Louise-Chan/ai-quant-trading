<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>账户总览</title>
  <link rel="stylesheet" href="../../css/account.css">
  <script src="https://unpkg.com/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
  <div id="toast-container"></div>
  <div class="account-page">
    <p class="account-mode-label"><span id="account-mode-label">模拟账户</span> <a href="#" id="btn-debug" class="debug-link">诊断</a></p>
    <div id="mirror-banner" class="mirror-banner" style="display:none;"></div>
    <div id="diagnose-output" class="diagnose-output hidden"></div>
    <section class="portfolio-section">
      <div class="section-header">
        <h2>投资组合</h2>
        <button class="btn-refresh" id="btn-refresh-portfolio" type="button" title="刷新" aria-label="刷新">
          <svg class="refresh-icon" viewBox="0 0 24 24" width="16" height="16"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" fill="currentColor"/></svg>
        </button>
      </div>
      <div id="portfolio-summary" class="portfolio-summary"></div>
      <div id="nav-chart" class="nav-chart"></div>
      <p id="nav-chart-caption" class="nav-chart-caption" style="display:none;"></p>
    </section>
    <section class="assets-section">
      <div class="section-header">
        <h2>资产净值</h2>
        <button class="btn-refresh" id="btn-refresh-assets" type="button" title="刷新" aria-label="刷新">
          <svg class="refresh-icon" viewBox="0 0 24 24" width="16" height="16"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" fill="currentColor"/></svg>
        </button>
      </div>
      <div id="assets-balance" class="assets-balance"></div>
    </section>
    <section class="trading-section">
      <div class="section-header">
        <h2>交易记录</h2>
        <button class="btn-refresh" id="btn-refresh-trading" type="button" title="刷新" aria-label="刷新">
          <svg class="refresh-icon" viewBox="0 0 24 24" width="16" height="16"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" fill="currentColor"/></svg>
        </button>
      </div>
      <div class="tabs">
        <button class="tab active" data-tab="orders">交易流水</button>
        <button class="tab" data-tab="positions">持仓明细</button>
      </div>
      <div id="orders-filter" class="order-filter" style="display:none">
        <button class="filter-btn active" data-status="open">未成交</button>
        <button class="filter-btn" data-status="finished">已成交/已撤</button>
      </div>
      <div id="orders-list" class="list-content"></div>
      <div id="positions-list" class="list-content hidden"></div>
    </section>
  </div>
  <script src="../../js/config.js"></script>
  <script src="../../js/api.js"></script>
  <script src="account.js"></script>
</body>
</html>
